<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisualShop - Punto de Venta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/landing.css') }}" rel="stylesheet">
</head>
<body>

    <div class="login-page">
        <div class="login-left">
            <div class="login-left-content">
                <div class="login-logo-big">
                    <i class="bi bi-bag" style="font-size:32px"></i>
                </div>
                <h1 class="login-hero-title">VisualShop</h1>
                <p class="login-hero-sub">Sistema de punto de venta</p>
                <div class="login-features">
                    <div class="login-feature">
                        <i class="bi bi-cart3"></i>
                        <span>Punto de venta rapido</span>
                    </div>
                    <div class="login-feature">
                        <i class="bi bi-box-seam"></i>
                        <span>Control de inventario</span>
                    </div>
                    <div class="login-feature">
                        <i class="bi bi-graph-up"></i>
                        <span>Reportes y graficas</span>
                    </div>
                    <div class="login-feature">
                        <i class="bi bi-people"></i>
                        <span>Gestion de empleados</span>
                    </div>
                    <div class="login-feature">
                        <i class="bi bi-upc-scan"></i>
                        <span>Codigo de barras</span>
                    </div>
                    <div class="login-feature">
                        <i class="bi bi-receipt"></i>
                        <span>Tickets y facturacion</span>
                    </div>
                </div>
            </div>
            <p class="login-footer-text">VisualShop 2026 - UTNG</p>
        </div>

        <div class="login-right">
            <div class="login-form-wrapper">
                <h4 class="login-form-title">Iniciar sesion</h4>
                <p class="login-form-sub">Ingresa tus credenciales para acceder al sistema</p>

                <div id="login-alert" class="alert-vs mb-3"></div>

                <div class="mb-3">
                    <label class="login-label">Correo electronico</label>
                    <input type="email" class="form-control login-input" id="login-email" placeholder="tu@email.com">
                </div>
                <div class="mb-3">
                    <label class="login-label">Contrasena</label>
                    <input type="password" class="form-control login-input" id="login-password" placeholder="********">
                </div>

                <button class="btn btn-vs-primary w-100 mb-3" id="btn-login" onclick="handleLogin()">
                    <span id="login-text">Iniciar sesion</span>
                    <div id="login-spinner" class="spinner-border spinner-vs" role="status"></div>
                </button>

                <div class="divider">
                    <span>o</span>
                </div>

                <button class="btn-google" onclick="handleGoogleLogin()">
                    <svg width="16" height="16" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    Continuar con Google
                </button>

                <p class="login-forgot">Olvidaste tu contrasena?</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/landing.js') }}"></script>

</body>
</html>
