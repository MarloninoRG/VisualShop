<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VisualShop{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body>

    <div class="app-wrapper">
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <i class="bi bi-bag" style="color:var(--vs-lavender);font-size:14px"></i>
                </div>
                <span class="sidebar-brand">VisualShop</span>
                <button class="sidebar-close d-lg-none" onclick="toggleSidebar()">
                    <i class="bi bi-x" style="font-size:20px;color:var(--vs-gray-light)"></i>
                </button>
            </div>

            <div class="sidebar-menu">
                <a href="/dashboard" class="sidebar-item {% block nav_dashboard %}{% endblock %}">
                    <i class="bi bi-grid"></i> Dashboard
                </a>
                <a href="/pos" class="sidebar-item {% block nav_pos %}{% endblock %}">
                    <i class="bi bi-cart3"></i> Nueva venta
                </a>
                <a href="/productos" class="sidebar-item {% block nav_productos %}{% endblock %}">
                    <i class="bi bi-box-seam"></i> Productos
                </a>
                <a href="/ventas" class="sidebar-item {% block nav_ventas %}{% endblock %}">
                    <i class="bi bi-receipt"></i> Ventas
                </a>
                <a href="/usuarios" class="sidebar-item {% block nav_usuarios %}{% endblock %}" id="nav-usuarios">
                    <i class="bi bi-people"></i> Usuarios
                </a>
            </div>

            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="sidebar-avatar" id="user-avatar">--</div>
                    <div>
                        <p class="sidebar-username" id="user-name">Cargando...</p>
                        <p class="sidebar-role" id="user-role">---</p>
                    </div>
                </div>
                <button class="sidebar-logout" onclick="handleLogout()" title="Cerrar sesion">
                    <i class="bi bi-box-arrow-right"></i>
                </button>
            </div>
        </nav>

        <div class="sidebar-overlay d-lg-none" id="sidebar-overlay" onclick="toggleSidebar()"></div>

        <main class="main-content">
            <div class="main-header d-lg-none">
                <button class="btn-hamburger" onclick="toggleSidebar()">
                    <i class="bi bi-list" style="font-size:24px;color:var(--vs-navy)"></i>
                </button>
                <span style="font-size:15px;font-weight:500;color:var(--vs-navy)">VisualShop</span>
            </div>
            <div class="main-body">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block extra_js %}{% endblock %}

</body>
</html>
